<div
  *ngIf="news"
  class="news-item"
  [class.news-item_small]="isSmall()"
  [class.news-item_large]="isLarge()"
>
  <div class="news-item__wrap-head">
    <div
      [class]="['news-item__category-name', categoryIdClassName]"
    >
      {{news.group}}
    </div>
    <div
      *ngIf="isDefault() || isLarge()"
      class="news-item__date"
    >
      {{news.scheduled_time | date: 'HH:mm dd.MM.yy'}}
    </div>
    <img
      *ngIf="isDefault() || isLarge()"
      [src]="news.image"
      alt=""
      class="news-item__img img-cover"
    >
  </div>
  <div class="news-item__content">
    <div class="news-item__title">
      <h3>
        {{news.name | firstCapitalLetter}}
      </h3>
    </div>
    <div
      *ngIf="isSmall() || isDefault()"
      class="news-item__text"
      [innerHTML]="news.message | truncate"
    ></div>
    <div
      *ngIf="isLarge()"
      class="news-item__text"
      [innerHTML]="news.message"
    ></div>
    <div
      *ngIf="isSmall() || isDefault()"
      class="news-item__btn"
    >
      <span
        *ngIf="isSmall()"
        class="fw-600"
      >
        {{news.scheduled_time | date: 'HH:mm dd.MM.yy'}}
      </span>
      <a
        [routerLink]="['news', news.id]"
        [class.btn]="isDefault()"
        [class.btn_link]="isDefault()"
        [class.link-text]="isSmall()"
      >
        <span>Подробнее</span>
      </a>
    </div>
  </div>
</div>
