<section class="section-news-list">
  <div class="container">
    <div class="news-list">
      <div class="news-list__wrap-filter">
        <button
          type="button"
          class="btn news-list__filter-settings"
          appTippy="Настройки фильтра"
          data-tippy-delay="[500, 0]"
          data-tippy-placement="top-start"
          data-tippy-animation="shift-away"
          (click)="openModal()"
        >
          <svg-icon src="assets/img/filter-settings.svg"></svg-icon>
        </button>
        <form
          class="news-list__search"
          [class.news-list__search_open]="isOnSearch"
          [formGroup]="form"
          (mouseenter)="onSearch()"
          (mouseleave)="offSearch()"
        >
          <input
            type="text"
            formControlName="search"
            placeholder="Поиск по событиям"
          >
          <button type="submit" class="btn">
            <svg-icon src="assets/img/search.svg"></svg-icon>
          </button>
        </form>
      </div>
      <div class="news-list__main">
        <div class="news-list__main-news">
          <app-news-item
            *ngFor="let news of (news$ | async)?.results"
            [news]="news"
          ></app-news-item>
        </div>
      </div>
      <div class="news-list__right">
        <div class="news-list__additional-news">
          <app-news-item
            *ngFor="let news of (news$ | async)?.results"
            [news]="news"
            size="small"
          ></app-news-item>
        </div>
      </div>
    </div>
  </div>
</section>

<ngx-smart-modal #filterSettings identifier="filterSettings">
  <div class="filter-settings">
    <div class="filter-settings__head">
      <button
        class="btn filter-settings__back"
        (click)="filterSettings.close()"
      >
        <svg-icon src="assets/img/arrow-big-left.svg"></svg-icon>
        <span>Настроить фильтр</span>
      </button>
    </div>
    <div class="filter-settings__territory">
      <div class="filter-settings__search">
        <svg-icon src="assets/img/search.svg"></svg-icon>
      </div>
      <overlay-scrollbars class="filter-settings__wrap-list">
        <ul class="filter-settings__list">
          <li>
            <label class="area-checkbox">
              <input type="checkbox">
              <span>Все территории</span>
            </label>
            <ul>
              <li *ngFor="let region of regions$ | async">
                <label class="area-checkbox">
                  <input type="checkbox">
                  <span>
                    {{region.name}}
                  </span>
                </label>
              </li>
            </ul>
          </li>
        </ul>
      </overlay-scrollbars>
    </div>
    <div class="filter-settings__categories">
      <overlay-scrollbars class="filter-settings__wrap-list">
        <ul class="filter-settings__list">
          <li>
            <label class="area-checkbox">
              <input type="checkbox">
              <span>Все территории</span>
            </label>
            <ul>
              <li *ngFor="let category of categories$ | async">
                <label class="area-checkbox">
                  <input type="checkbox">
                  <span>
                    {{category.name}}
                  </span>
                </label>
              </li>
            </ul>
          </li>
        </ul>
      </overlay-scrollbars>
    </div>
  </div>
</ngx-smart-modal>
